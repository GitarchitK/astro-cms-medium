<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0b0f19" />
  <!-- Technical Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="630" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="500" y1="0" x2="500" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="700" y1="0" x2="700" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
    <line x1="1100" y1="0" x2="1100" y2="630" />
    
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="500" x2="1200" y2="500" />
    <line x1="0" y1="600" x2="1200" y2="600" />
  </g>
  <!-- Accent Glow -->
  <circle cx="600" cy="315" r="300" fill="#6366f1" fill-opacity="0.03" filter="blur(60px)" />
  <!-- Logo & Slogan -->
  <g transform="translate(600, 310)" text-anchor="middle">
    <!-- Brand Dot Logo -->
    <text y="-30" font-family="Georgia, serif" font-weight="900" font-size="96" fill="#ffffff" letter-spacing="-3">Mershal<tspan fill="#6366f1">.</tspan></text>
    <text y="50" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#94a3b8" letter-spacing="4" text-transform="uppercase">Authority Blueprints &amp; Tech Guides</text>
  </g>
</svg>
